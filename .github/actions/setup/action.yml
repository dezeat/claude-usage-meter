name: Setup
description: Set up Node (npm cache) and install with npm ci. Run after actions/checkout.
# Shared by every CI job so the toolchain is defined once. node-version defaults to
# the engines floor; the test job overrides it to fan out across the matrix.
inputs:
  node-version:
    description: Node version to set up.
    default: "22.13"
runs:
  using: composite
  steps:
    # SHA-pinned for an auditable, immutable ref; Dependabot bumps it (the
    # github-actions ecosystem scans composite action files too, so the pin stays
    # fresh). Rationale spelled out once in ci.yml.
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
    - run: npm ci
      shell: bash
