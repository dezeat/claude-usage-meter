version: 2
updates:
  # Dev dependencies only (the plugin ships zero runtime deps — D-012). Minor and
  # patch bumps are grouped into one weekly PR to keep the noise down; majors
  # still arrive as individual PRs so they get a deliberate review.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    groups:
      dev-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # @types/node major bumps are ignored: the types should not race ahead of the
    # supported Node range (floor 22.13), and the recurring major PRs are noise.
    # Minor/patch still flow through the grouped dev-dependencies update above.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      # codeql-action's init + analyze ship in lockstep and MUST share a version —
      # the analyze job fails on any mismatch. Group them across all update types
      # (majors included) so the coupled pair always bumps in one PR; splitting
      # them, as Dependabot did by default, produced two permanently-red PRs.
      codeql-action:
        patterns: ["github/codeql-action*"]
      # Everything else: batch minor/patch to cut PR noise; majors still arrive
      # individually for a deliberate review (mirrors the npm policy above).
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
