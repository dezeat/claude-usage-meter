name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel a superseded in-flight run when new commits land on the same ref, so a
# busy PR (or a quick succession of merges) doesn't burn minutes on stale runs.
# Keyed on the workflow name so each workflow has its own lane and they never
# cancel one another.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the checkout.
permissions:
  contents: read

# One job per concern, so each is its own pass/fail signal on a PR and mirrors the
# matching npm script (`npm run check` stays the one-shot local gate that pre-push
# and branch protection invoke). The static checks run once; only `test` fans out
# across the Node matrix, since that is the pass that exercises node:sqlite.
jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      # A floating tag (@v6) is mutable — the SHA it resolves to can change under
      # you; a full-length commit SHA is the auditable, immutable artifact.
      # Dependabot still bumps these pinned SHAs (github-actions ecosystem in
      # dependabot.yml), so pinning costs no freshness — that is the point of
      # pairing pin + Dependabot. setup-node's pin lives once in the composite
      # ./.github/actions/setup.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: npm run format:check

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: npm run typecheck

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: npm run build

  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite is available without a flag from 22.13 (the engines floor)
        # and 23.4 on the current line — prove the floor, current LTS, next major.
        node: ["22.13", "22", "24"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}
      - run: npm run test
