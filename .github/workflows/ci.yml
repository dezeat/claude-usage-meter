name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the checkout.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite is available without a flag from 22.13 (the engines floor)
        # and 23.4 on the current line — prove the floor, current LTS, next major.
        node: ["22.13", "22", "24"]
    name: check (node ${{ matrix.node }})
    steps:
      # A floating tag (@v6) is mutable — the SHA it resolves to can change under
      # you; a full-length commit SHA is the auditable, immutable artifact.
      # Dependabot still bumps these pinned SHAs (github-actions ecosystem in
      # dependabot.yml), so pinning costs no freshness — that is the point of
      # pairing pin + Dependabot.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # `npm run check` stays the single umbrella gate (pre-push and branch
      # protection invoke exactly this). The discrete test step below re-runs the
      # suite purely for log visibility — a reader sees the tests passing on their
      # own line rather than buried inside `check`.
      - name: check (typecheck + lint + format + build + test)
        run: npm run check
      - name: test
        run: npm run test
