name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the checkout.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite is available without a flag from 22.13 (the engines floor)
        # and 23.4 on the current line — prove the floor, current LTS, next major.
        node: ["22.13", "22", "24"]
    name: check (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check
