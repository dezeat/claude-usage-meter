name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly off-hours scan catches advisories that land between pushes.
    - cron: "27 4 * * 1"

# Cancel a superseded in-flight analysis on the same ref — CodeQL is the most
# expensive run, so dropping stale ones is the biggest minute saver.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege at the top level; the analyze job widens to exactly what CodeQL
# needs (security-events:write to upload findings).
permissions:
  contents: read

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    # Code scanning needs GitHub Advanced Security on a private repo, so the
    # upload 403s until the public flip (where CodeQL is free). Gate to public:
    # the job skips cleanly now and auto-activates when the repo goes public.
    if: ${{ github.event.repository.visibility == 'public' }}
    permissions:
      contents: read
      security-events: write # upload the SARIF results to code scanning
    steps:
      # SHA-pinned for auditability; Dependabot bumps these. (Rationale spelled
      # out once in ci.yml.)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          # One language entry: TS compiles through the JS analyzer, no build step.
          languages: javascript-typescript
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:javascript-typescript"
