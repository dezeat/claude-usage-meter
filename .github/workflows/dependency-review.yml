name: Dependency Review

on:
  pull_request:
    branches: [main]

# Least privilege: the action diffs the PR's dependency manifest against the
# advisory database — it only needs to read the checkout.
permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    # The dependency-review API needs the dependency graph + GitHub Advanced
    # Security, unavailable on a free private repo. Gate to public so it skips
    # here and activates automatically at the public flip.
    if: ${{ github.event.repository.visibility == 'public' }}
    steps:
      # SHA-pinned for auditability; Dependabot bumps it. (Rationale in ci.yml.)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Block a PR that introduces a high-or-worse known vulnerability.
          fail-on-severity: high
          # The plugin ships zero runtime deps and MIT-licenses its dev tooling;
          # flag any GPL-family copyleft that would slip in via a dependency.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-3.0
