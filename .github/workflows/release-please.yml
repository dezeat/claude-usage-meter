name: Release Please

on:
  push:
    branches: [main]

# Least privilege: release-please only writes the release PR/commit (contents)
# and manages that PR (pull-requests). It needs nothing else.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Manifest mode: config + manifest are read from the repo root
      # (release-please-config.json / .release-please-manifest.json), which keeps
      # package.json and .claude-plugin/plugin.json bumped in lockstep.
      # SHA-pinned for an auditable, immutable action ref; Dependabot bumps it.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
