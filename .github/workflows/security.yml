name: Security

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: these jobs only read the checkout.
permissions:
  contents: read

jobs:
  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so a secret in any commit is caught
      # Run the binary directly rather than gitleaks-action: the action's PR mode
      # calls the GitHub API for the PR's commits, which the least-privilege
      # contents:read token cannot reach. The binary scans git history locally.
      - name: Install gitleaks
        run: |
          version=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan git history for secrets
        run: gitleaks git . --config .gitleaks.toml --redact --no-banner

  audit:
    name: npm audit (production deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.13"
      # The plugin is zero-runtime-deps by design, so a production advisory means
      # a runtime dependency slipped in — fail on it. Dev deps are covered by
      # Dependabot, not gated here.
      - run: npm audit --omit=dev --audit-level=high
