<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-label="A Claude Code input bar with the goal improve claude-usage-meter, make no mistakes, above a four-row statusline showing current, limits, spend and fleet data with synthetic illustrative values, and an auto-mode footer">
  <defs>
    <linearGradient id="terminal-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11161d"/>
      <stop offset="1" stop-color="#0b0f14"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <clipPath id="terminal-clip">
      <rect x="20" y="18" width="880" height="264" rx="12"/>
    </clipPath>
  </defs>

  <style>
    text {
      font-family: "SFMono-Regular", "Cascadia Code", "Consolas", "DejaVu Sans Mono", "Menlo", monospace;
      font-size: 14px;
    }
    .accent { fill: #58a6ff; }
    .claude { fill: #d97757; }
    .bright { fill: #f0f6fc; }
    .base   { fill: #c9d1d9; }
    .dim    { fill: #7d8590; }
    .green  { fill: #3fb950; }
    .red    { fill: #f85149; }
  </style>

  <rect width="920" height="300" fill="#070a0e"/>
  <g filter="url(#shadow)">
    <rect x="20" y="18" width="880" height="264" rx="12" fill="url(#terminal-bg)" stroke="#30363d"/>
  </g>

  <g clip-path="url(#terminal-clip)">
    <rect x="38" y="40" width="844" height="54" rx="8" fill="#10151c" stroke="#8f5544" stroke-width="1.5"/>
    <text x="57" y="73" class="claude" font-size="18">❯</text>
    <text x="83" y="72" class="bright">/goal improve claude-usage-meter, make no mistakes</text>

    <path d="M20 118H900" stroke="#2b313a"/>

    <text x="54" y="150" xml:space="preserve"><tspan class="accent">current  </tspan><tspan class="bright">opus 4.8 (1m context)</tspan><tspan class="dim"> · </tspan><tspan class="bright">claude-usage-meter</tspan><tspan class="dim"> ⎇ </tspan><tspan class="base">main</tspan><tspan class="dim"> ⌂ </tspan><tspan class="base">root</tspan></text>

    <text x="54" y="176" xml:space="preserve"><tspan class="accent">limits   </tspan><tspan class="base">5h </tspan><tspan class="green">▓</tspan><tspan class="bright">│</tspan><tspan class="dim">░░</tspan><tspan class="base"> 42%</tspan><tspan class="dim"> ⟳ 2h · </tspan><tspan class="base">7d </tspan><tspan class="red">▓▓▓</tspan><tspan class="bright">│</tspan><tspan class="red">░</tspan><tspan class="base"> 78%</tspan><tspan class="dim"> ⟳ 3d (Sa 26.07)</tspan></text>

    <text x="54" y="202" xml:space="preserve"><tspan class="accent">spend    </tspan><tspan class="dim">ses </tspan><tspan class="bright">$2.14</tspan><tspan class="dim"> · Σ $246.80 mo</tspan></text>

    <text x="54" y="228" xml:space="preserve"><tspan class="accent">fleet    </tspan><tspan class="bright">6</tspan><tspan class="dim"> Σ </tspan><tspan class="bright">11</tspan><tspan class="dim"> · </tspan><tspan class="green">●</tspan><tspan class="bright"> opus 2</tspan></text>

    <text x="54" y="262" xml:space="preserve"><tspan class="claude">⏵⏵ auto mode on</tspan><tspan class="dim"> (shift+tab to cycle) · ← for agents</tspan></text>
  </g>
</svg>
